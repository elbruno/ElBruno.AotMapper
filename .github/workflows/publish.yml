name: Publish to NuGet

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Package version (leave empty to use csproj version)"
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
            VERSION="${VERSION#.}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
            VERSION="${VERSION#v}"
            VERSION="${VERSION#.}"
          else
            VERSION=$(grep -oP '<Version>\K[^<]+' src/ElBruno.AotMapper/ElBruno.AotMapper.csproj)
          fi
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "❌ Invalid version: '$VERSION'"; exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "📦 Publishing version: $VERSION"

      - name: Restore
        run: dotnet restore ElBruno.AotMapper.slnx

      - name: Build
        run: dotnet build ElBruno.AotMapper.slnx -c Release --no-restore -p:Version=${{ steps.version.outputs.version }}

      - name: Test
        run: dotnet test ElBruno.AotMapper.slnx -c Release --no-build --framework net8.0 --verbosity normal

      - name: Pack
        run: |
          dotnet pack src/ElBruno.AotMapper/ElBruno.AotMapper.csproj -c Release --no-build -p:Version=${{ steps.version.outputs.version }} -o artifacts
          dotnet pack src/ElBruno.AotMapper.Generator/ElBruno.AotMapper.Generator.csproj -c Release --no-build -p:Version=${{ steps.version.outputs.version }} -o artifacts
          dotnet pack src/ElBruno.AotMapper.AspNetCore/ElBruno.AotMapper.AspNetCore.csproj -c Release --no-build -p:Version=${{ steps.version.outputs.version }} -o artifacts
          dotnet pack src/ElBruno.AotMapper.EntityFramework/ElBruno.AotMapper.EntityFramework.csproj -c Release --no-build -p:Version=${{ steps.version.outputs.version }} -o artifacts

      - name: NuGet login (OIDC → temp API key)
        # TODO: Verify and pin NuGet/login@v1 to commit SHA when stable version is available
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet.org
        run: dotnet nuget push "artifacts/*.nupkg" --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Upload NuGet package artifact
        uses: actions/upload-artifact@v7
        with:
          name: nupkg
          path: artifacts/*.nupkg
