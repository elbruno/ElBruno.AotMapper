name: "CodeQL"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # Weekly on Monday at 6 AM UTC

permissions:
  actions: read
  contents: read
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  analyze:
    name: Analyze (csharp)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@b4ffde65f69735f18ea3fca10e5218a4a1ba9476 # v4.2.2

      - name: Setup .NET
        uses: actions/setup-dotnet@4d6c8fcf3c8f7a60068d26b594648e99df24cee3 # v4.1.0
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Initialize CodeQL
        uses: github/codeql-action/init@df5a14dc28094dc936e103b37d749c6628682b60 # v3.28.0
        with:
          languages: csharp
          queries: security-and-quality

      - name: Restore dependencies
        run: dotnet restore ElBruno.AotMapper.slnx

      - name: Build
        run: dotnet build ElBruno.AotMapper.slnx --no-restore

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@df5a14dc28094dc936e103b37d749c6628682b60 # v3.28.0
        with:
          category: "/language:csharp"
